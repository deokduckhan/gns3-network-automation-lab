cat > ansible/show_commands.yml << 'EOF'
- name: Verify Cisco IOS router status
  hosts: routers
  gather_facts: false

  tasks:
    - name: Run verification commands
      ios_command:
        commands:
          - show ip interface brief
          - show ip ospf neighbor
          - show ip route ospf
      register: show_result

    - name: Save verification output
      copy:
        dest: "./outputs/{{ inventory_hostname }}_ansible_verification.txt"
        content: |
          ============================================================
          {{ inventory_hostname }} - show ip interface brief
          ============================================================
          {{ show_result.stdout[0] }}

          ============================================================
          {{ inventory_hostname }} - show ip ospf neighbor
          ============================================================
          {{ show_result.stdout[1] }}

          ============================================================
          {{ inventory_hostname }} - show ip route ospf
          ============================================================
          {{ show_result.stdout[2] }}
      delegate_to: localhost
EOF