- name: Collect show command outputs from Cisco IOS routers
  hosts: routers
  gather_facts: false

  tasks:
    - name: Run verification show commands
      cisco.ios.ios_command:
        commands:
          - show ip interface brief
          - show ip route
          - show ip ospf neighbor
      register: show_output

    - name: Print command outputs
      ansible.builtin.debug:
        var: show_output.stdout_lines